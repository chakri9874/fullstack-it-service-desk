spring.application.name=backend

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/it_service_desk}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

app.jwt.secret=${JWT_SECRET:ChangeThisJwtSecretForLocalDevelopmentOnly123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.demo.reset-passwords=true

app.ticket.weekly-rejection-limit=2
app.ticket.acceptance-timeout-minutes=120